<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Darwin Life Hub · Rent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta property="og:type" content="website">
  <meta property="og:title" content="Darwin Life Hub · 达尔文本地租房信息">
  <meta property="og:description" content="达尔文本地合租、整租、短租房源集中展示，位置、价格、配套一目了然。">
  <meta property="og:image" content="https://darwinbbs.com/darwin-logo.png">
  <meta property="og:url" content="https://darwinbbs.com/rent.html">
  <meta name="description" content="达尔文本地租房信息，包含合租、整租、短租等房源。">

  <style>
    :root {
      --bg:#f5f9f5;
      --bg-card:#ffffff;
      --primary:#16a34a;
      --text-main:#111827;
      --text-muted:#6b7280;
      --border:#d1e5d4;
      --max-width:1040px;
    }

    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text-main);
    }

    a{color:inherit;text-decoration:none;}

    .top-nav{
      width:100%;
      background:#e8f5ec;
      padding:10px 0;
      border-bottom:1px solid #cfe8d8;
      position:sticky;
      top:0;
      z-index:30;
      box-shadow:0 2px 4px rgba(15,23,42,0.06);
    }

    .nav-inner{
      max-width:1100px;
      margin:0 auto;
      padding:0 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .brand-logo{
      width:48px;
      height:48px;
      border-radius:50%;
      overflow:hidden;
      background:#ffffff;
      box-shadow:0 4px 14px rgba(0,0,0,0.15);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .brand-logo img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .brand-text-main{
      font-size:18px;
      font-weight:600;
      color:#022c22;
    }

    .brand-text-sub{
      font-size:13px;
      color:var(--text-muted);
      margin-top:-2px;
    }

    nav.nav-links{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      font-size:15px;
    }

    nav.nav-links a{
      padding:6px 12px;
      border-radius:6px;
      color:#0f172a;
      text-decoration:none;
      transition:0.15s ease;
    }

    nav.nav-links a:hover{background:#d9fbe5;}

    nav.nav-links a.active{
      background:#16a34a;
      color:#f0fdf4;
    }

    .shell{
      max-width:var(--max-width);
      margin:0 auto;
      padding:16px 16px 40px;
    }

    .layout{
      display:grid;
      grid-template-columns:minmax(0,1.4fr);
      gap:20px;
    }

    .card{
      background:var(--bg-card);
      border-radius:16px;
      padding:16px 18px 20px;
      border:1px solid var(--border);
      box-shadow:0 10px 30px rgba(15,23,42,0.08);
    }

    .card h2{
      font-size:20px;
      margin-bottom:8px;
    }

    .card p{
      font-size:14px;
      color:var(--text-muted);
    }

    .rent-list{
      margin-top:14px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .rent-card{
      border:1px solid #d1e5d4;
      border-radius:12px;
      background:#ffffff;
      padding:12px 16px;
      box-shadow:0 1px 2px rgba(15,23,42,0.05);
      cursor:pointer;
      transition:0.15s ease;
    }

    .rent-card:hover{
      transform:translateY(-1px);
      box-shadow:0 8px 24px rgba(15,23,42,0.08);
      background:#fbfffc;
    }

    .rent-card-title{
      margin:0 0 4px;
      font-size:18px;
      color:#0f172a;
    }

    .rent-summary{
      margin:4px 0 6px;
      white-space:pre-wrap;
      color:#475569;
      line-height:1.7;
      font-size:14px;
    }

    .rent-meta-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-top:8px;
      flex-wrap:wrap;
    }

    .rent-meta-left{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      font-size:12px;
      color:#6b7280;
    }

    .rent-stats{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      font-size:12px;
      color:#475569;
    }

    .rent-stat{
      display:inline-flex;
      align-items:center;
      gap:4px;
      white-space:nowrap;
    }

    .rent-share-btn{
      padding:4px 10px;
      border-radius:999px;
      border:1px solid #16a34a;
      background:#ffffff;
      color:#16a34a;
      font-size:12px;
      cursor:pointer;
    }

    form{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:6px;
    }

    input,textarea{
      width:100%;
      padding:8px 10px;
      border-radius:8px;
      border:1px solid var(--border);
      font-size:14px;
      font-family:inherit;
    }

    textarea{
      min-height:80px;
      resize:vertical;
    }

    button[type="submit"]{
      align-self:flex-start;
      padding:8px 18px;
      border-radius:999px;
      border:none;
      background:var(--primary);
      color:#f9fafb;
      font-size:14px;
      cursor:pointer;
      margin-top:4px;
    }

    button[type="submit"]:hover{
      background:#15803d;
    }

    #rentStatus{
      font-size:13px;
      margin-top:4px;
    }

    .image-group{
      margin-top:4px;
      font-size:13px;
      color:var(--text-muted);
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .image-group input[type="file"]{
      font-size:13px;
    }

    .rent-photos{
      margin-top:8px;
      display:flex;
      flex-wrap:wrap;
      gap:6px;
    }

    .rent-photos img{
      width:90px;
      height:90px;
      object-fit:cover;
      border-radius:8px;
      border:1px solid var(--border);
    }

    .preview-item{
      position:relative;
      display:inline-block;
    }

    .preview-remove{
      position:absolute;
      top:2px;
      right:2px;
      width:18px;
      height:18px;
      border:none;
      border-radius:50%;
      background:rgba(0,0,0,0.6);
      color:#fff;
      font-size:12px;
      line-height:18px;
      cursor:pointer;
    }

    .preview-remove:hover{
      background:rgba(0,0,0,0.85);
    }

    .clear-images-btn{
      margin-top:4px;
      padding:4px 10px;
      border-radius:999px;
      border:1px solid #d1e5d4;
      background:#f9fafb;
      font-size:12px;
      cursor:pointer;
      align-self:flex-start;
      color:red;
    }

    .clear-images-btn:hover{
      background:#ffe5e5;
      color:#c40000;
      border-color:#ffb3b3;
    }

    .fab{
      position:fixed;
      right:18px;
      bottom:18px;
      width:44px;
      height:44px;
      border-radius:50%;
      border:none;
      background:var(--primary);
      color:#f9fafb;
      font-size:26px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(15,23,42,0.6);
      z-index:50;
    }

    .fab:hover{
      background:#15803d;
    }

    .rent-detail-overlay{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,0.45);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:1000;
    }

    .rent-detail-card{
      max-width:820px;
      width:92%;
      max-height:90vh;
      overflow-y:auto;
      background:#ffffff;
      border-radius:16px;
      box-shadow:0 20px 45px rgba(15,23,42,0.25);
      padding:20px 24px 24px;
      position:relative;
    }

    .rent-detail-close{
      border:none;
      background:rgba(229,231,235,0.95);
      font-size:22px;
      cursor:pointer;
      position:sticky;
      top:8px;
      margin-left:auto;
      display:flex;
      align-items:center;
      justify-content:center;
      width:38px;
      height:38px;
      border-radius:999px;
      z-index:2;
    }

    .rent-detail-stats{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin:10px 0 12px;
      align-items:center;
      font-size:13px;
      color:#475569;
    }

    .rent-detail-stat{
      display:inline-flex;
      align-items:center;
      gap:5px;
      padding:6px 10px;
      border-radius:999px;
      background:#f8fafc;
      border:1px solid #e2e8f0;
    }

    .rent-like-btn{
      border:1px solid #16a34a;
      background:#ffffff;
      color:#16a34a;
      cursor:pointer;
    }

    .rent-comments-block{
      margin-top:18px;
      padding-top:12px;
      border-top:1px solid #e5e7eb;
    }

    .rent-comments-list{
      font-size:14px;
      max-height:240px;
      overflow-y:auto;
    }
  </style>
</head>
<body>
<header class="top-nav">
  <div class="nav-inner">
    <div class="brand">
      <div class="brand-logo">
        <img src="darwin-logo.png" alt="logo" />
      </div>
      <div>
        <div class="brand-text-main">Darwin Life Hub</div>
        <div class="brand-text-sub">达尔文华人生活门户</div>
      </div>
    </div>
    <nav class="nav-links">
      <a href="index.html">首页</a>
      <a href="news.html">新闻</a>
      <a href="jobs.html">工作</a>
      <a href="cv.html">Marketplace</a>
      <a href="rent.html" class="active">租房</a>
      <a href="forum.html">广场</a>
      <a href="my.html">我的</a>
      <a href="about.html">关于</a>
    </nav>
  </div>
</header>

<div class="shell">
  <main class="layout">
    <section class="card">
      <h2>租房信息 · Rent</h2>
      <p>发布达尔文本地合租 / 整租 / 短租房源信息。</p>

      <div id="rentList" class="rent-list"></div>

      <div class="form-section" id="rentFormSection" style="margin-top:26px;padding-top:14px;border-top:1px dashed var(--border);">
        <h3 style="font-size:16px;margin-bottom:6px;">发布房源</h3>
        <form id="rentForm">
          <input id="rentTitle" placeholder="房源标题（必填）" required />
          <input id="rentContact" placeholder="联系方式（必填）" required />
          <textarea id="rentContent" placeholder="房源详情：位置、价格、包不包水电网等"></textarea>

          <div class="image-group">
            <label for="rentImages">房源照片（可选，最多 5 张）：</label>
            <input id="rentImages" type="file" accept="image/*" multiple />
            <small>提示：可以一次选择多张，也可以分多次选择，累计最多 5 张。</small>
          </div>

          <div id="rentPreview" class="rent-photos"></div>

          <button type="button" id="rentClearImages" class="clear-images-btn">
            清空图片
          </button>

          <button type="submit">发布</button>
          <div id="rentStatus"></div>
        </form>
      </div>
    </section>
  </main>
</div>

<button class="fab" id="fabRent">+</button>

<script>
  document.getElementById("fabRent").addEventListener("click", () => {
    document.getElementById("rentFormSection").scrollIntoView({ behavior: "smooth" });
  });
</script>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="auth-guard.js"></script>
<script src="rent.js"></script>
</body>
</html>
