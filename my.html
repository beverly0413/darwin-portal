<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>我的 · Darwin Life Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg:#f5f9f5;
      --card:#ffffff;
      --line:#d1e5d4;
      --text:#111827;
      --muted:#6b7280;
      --primary:#0f9f9a;
      --danger:#b91c1c;
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    a { color:inherit; text-decoration:none; }
    .top-nav {
      width:100%;
      background:#ffffff;
      padding:10px 0;
      border-bottom:1px solid #cfe8d8;
      position:sticky;
      top:0;
      z-index:30;
      box-shadow:0 2px 4px rgba(15,23,42,0.06);
    }
    .nav-inner {
      max-width:1100px;
      margin:0 auto;
      padding:0 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .brand { display:flex; align-items:center; gap:10px; }
    .brand-logo {
      width:40px;
      height:40px;
      border-radius:50%;
      overflow:hidden;
      background:#fff;
      box-shadow:0 4px 10px rgba(0,0,0,0.12);
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .brand-logo img { width:100%; height:100%; object-fit:cover; }
    .brand-text-main { font-size:18px; font-weight:600; color:#022c22; }
    .brand-text-sub { font-size:13px; color:var(--muted); margin-top:-2px; }
    .nav-links { display:flex; flex-wrap:wrap; gap:8px; font-size:14px; }
    .nav-links a { padding:6px 10px; border-radius:6px; }
    .nav-links a:hover, .nav-links a.active { background:#0f9f9a; color:#f0fdf4; }
    .shell {
      max-width:1040px;
      margin:0 auto;
      padding:18px 16px 48px;
    }
    .profile-hero {
      display:grid;
      grid-template-columns:auto minmax(0,1fr) auto;
      gap:16px;
      align-items:center;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:8px;
      padding:16px;
      box-shadow:0 10px 28px rgba(15,23,42,0.06);
    }
    .avatar {
      width:82px;
      height:82px;
      border-radius:50%;
      overflow:hidden;
      background:#dcfce7;
      display:grid;
      place-items:center;
      border:1px solid #bbf7d0;
      color:#166534;
      font-size:24px;
      font-weight:700;
    }
    .avatar img { width:100%; height:100%; object-fit:cover; display:none; }
    h1 { margin:0; font-size:22px; }
    .muted { color:var(--muted); font-size:13px; }
    .logout-btn, .save-btn, .danger-btn, .tab-btn {
      border:none;
      border-radius:999px;
      cursor:pointer;
      font-size:13px;
      white-space:nowrap;
    }
    .logout-btn {
      padding:7px 14px;
      border:1px solid #fecaca;
      background:#fee2e2;
      color:var(--danger);
    }
    .save-btn {
      padding:9px 16px;
      background:var(--primary);
      color:#fff;
    }
    .layout {
      display:grid;
      grid-template-columns:340px minmax(0,1fr);
      gap:16px;
      margin-top:16px;
      align-items:start;
    }
    .panel {
      background:var(--card);
      border:1px solid var(--line);
      border-radius:8px;
      padding:16px;
      box-shadow:0 10px 28px rgba(15,23,42,0.05);
    }
    .panel h2 { margin:0 0 12px; font-size:16px; }
    label {
      display:block;
      margin:10px 0 4px;
      font-size:13px;
      color:#374151;
    }
    input, select, textarea {
      width:100%;
      border:1px solid var(--line);
      border-radius:8px;
      padding:8px 10px;
      font:inherit;
      font-size:14px;
      background:#fff;
    }
    textarea { min-height:88px; resize:vertical; }
    .profile-actions {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:12px;
    }
    #profileStatus, #userInfo {
      font-size:12px;
      color:var(--muted);
    }
    .tabs {
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:12px;
    }
    .tab-btn {
      padding:7px 12px;
      border:1px solid var(--line);
      background:#f9fafb;
      color:#374151;
    }
    .tab-btn.active {
      background:#dcfce7;
      color:#166534;
      border-color:#86efac;
    }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }
    .status {
      margin-top:8px;
      font-size:13px;
      color:var(--muted);
    }
    .list {
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .manage-item {
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      gap:12px;
      align-items:start;
      border:1px solid var(--line);
      border-radius:8px;
      padding:12px;
      background:#fff;
    }
    .manage-item h3 {
      margin:3px 0 4px;
      font-size:15px;
    }
    .manage-item p {
      margin:0;
      color:#4b5563;
      font-size:13px;
      line-height:1.6;
      white-space:pre-wrap;
      word-break:break-word;
    }
    .item-kicker {
      font-size:12px;
      color:#6b7280;
    }
    .danger-btn {
      padding:6px 12px;
      background:#fee2e2;
      color:var(--danger);
      border:1px solid #fecaca;
    }
    .hint {
      margin:8px 0 0;
      font-size:12px;
      color:#6b7280;
      line-height:1.6;
    }
    @media (max-width: 760px) {
      .profile-hero {
        grid-template-columns:auto minmax(0,1fr);
      }
      .profile-hero .logout-btn {
        grid-column:1 / -1;
        width:100%;
      }
      .layout {
        grid-template-columns:1fr;
      }
      .manage-item {
        grid-template-columns:1fr;
      }
      .danger-btn {
        width:100%;
      }
    }
  </style>
  <link rel="stylesheet" href="portal.css">
</head>
<body>
  <header class="top-nav">
    <div class="nav-inner">
      <a href="index.html" class="brand">
        <div class="brand-logo">
          <img src="darwin-logo.png" alt="logo" />
        </div>
        <div>
          <div class="brand-text-main">Darwin Life Hub</div>
          <div class="brand-text-sub">新闻 · 工作 · 活动</div>
        </div>
      </a>
      <nav class="nav-links">
        <a href="index.html">首页</a>
        <a href="news.html">新闻</a>
        <a href="jobs.html">工作</a>
        <a href="events.html">活动</a>
        <a href="my.html" class="active">我的</a>
      </nav>
    </div>
  </header>

  <main class="shell">
    <section class="profile-hero">
      <div class="avatar">
        <img id="profileAvatarImg" alt="头像" />
        <span id="profileAvatarInitials">DL</span>
      </div>
      <div>
        <h1 id="profileName">我的主页</h1>
        <div id="profileEmail" class="muted"></div>
        <div id="userInfo">正在获取用户信息...</div>
      </div>
      <button id="logoutBtn" class="logout-btn" type="button">退出登录</button>
    </section>

    <div class="layout">
      <section class="panel">
        <h2>个人资料</h2>
        <label for="profileNickname">昵称</label>
        <input id="profileNickname" type="text" maxlength="30" placeholder="例如：达尔文小伙伴" />

        <label for="profileAge">年龄</label>
        <input id="profileAge" type="number" min="13" max="120" placeholder="可选" />

        <label for="profileGender">性别</label>
        <select id="profileGender">
          <option value="private">不公开</option>
          <option value="female">女</option>
          <option value="male">男</option>
          <option value="other">其他</option>
        </select>

        <label for="profileAvatar">头像图片链接</label>
        <input id="profileAvatar" type="url" placeholder="https://..." />

        <label for="profileBio">个人简介</label>
        <textarea id="profileBio" maxlength="200" placeholder="简单介绍一下自己"></textarea>

        <div class="profile-actions">
          <button id="saveProfileBtn" class="save-btn" type="button">保存资料</button>
          <span id="profileStatus"></span>
        </div>
        <p class="hint">头像现在使用图片链接保存；后面如果你要接 Supabase Storage，可以在这里升级成直接上传。</p>
      </section>

      <section class="panel">
        <div class="tabs">
          <button class="tab-btn active" type="button" data-tab="postsPanel">我的帖子</button>
          <button class="tab-btn" type="button" data-tab="commentsPanel">我的评论</button>
          <button class="tab-btn" type="button" data-tab="messagesPanel">私信</button>
        </div>

        <div id="postsPanel" class="tab-panel active">
          <div id="myPostsList" class="list"></div>
          <div id="myPostsStatus" class="status">正在加载发布内容...</div>
        </div>

        <div id="commentsPanel" class="tab-panel">
          <div id="myCommentsList" class="list"></div>
          <div id="myCommentsStatus" class="status">正在加载评论...</div>
        </div>

        <div id="messagesPanel" class="tab-panel">
          <div id="myMessagesList" class="list"></div>
          <div id="myMessagesStatus" class="status">正在加载私信...</div>
          <p class="hint">私信需要先运行 Supabase 脚本创建 user_messages 表。当前页面已准备好收件箱、发件箱和删除功能。</p>
        </div>
      </section>
    </div>
  </main>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="my.js"></script>
</body>
</html>
