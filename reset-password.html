<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>重置密码 · Darwin Life Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f7f2;
      color: #0f172a;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(420px, 100%);
      background: #ffffff;
      border: 1px solid #d1e5d4;
      border-radius: 8px;
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.12);
      padding: 22px 18px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 28px;
      color: #15803d;
      text-align: center;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 18px;
      color: #4b5563;
      text-align: center;
      line-height: 1.45;
    }
    input {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      border: 1px solid #cbd5d1;
      border-radius: 6px;
      font: inherit;
      font-size: 16px;
      margin-bottom: 12px;
    }
    input:focus {
      outline: 2px solid rgba(22, 163, 74, 0.18);
      border-color: #16a34a;
    }
    button {
      width: 100%;
      height: 48px;
      border: 0;
      border-radius: 6px;
      background: #16a34a;
      color: #ffffff;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      font-size: 17px;
    }
    button:hover:not(:disabled) {
      background: #15803d;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }
    #msg {
      min-height: 22px;
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.45;
      text-align: center;
      color: #6b7280;
    }
    .links {
      margin-top: 16px;
      text-align: center;
    }
    .links a {
      color: #15803d;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>重置密码</h1>
    <p>请输入新密码。设置成功后可以用新密码登录。</p>
    <form id="resetPasswordForm">
      <input id="password" type="password" placeholder="新密码，至少 6 位" autocomplete="new-password" required />
      <input id="confirmPassword" type="password" placeholder="再次输入新密码" autocomplete="new-password" required />
      <button type="submit" id="resetPasswordBtn">保存新密码</button>
      <div id="msg" role="status" aria-live="polite"></div>
    </form>
    <div class="links">
      <a href="login.html">返回登录</a>
    </div>
  </main>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="reset-password.js"></script>
</body>
</html>
