<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Darwin Life Hub · News</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./news.css" />

  <!-- 少量兜底样式，防止 news.css 没完全覆盖 -->
  <style>
    #modalBody {
      white-space: pre-line;
      word-break: break-word;
      overflow-wrap: break-word;
    }

    #modalBody img {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 28px auto;
    }

    #newsList img,
    #modalHeroImage {
      max-width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>

<body>
  <header class="top-nav">
    <div class="nav-inner">
      <a href="index.html" class="brand" aria-label="返回 Darwin Life Hub 首页">
        <div class="brand-logo">
          <img src="darwin-logo.png" alt="Darwin Life Hub logo">
        </div>
        <div>
          <div class="brand-text-main">Darwin Life Hub</div>
          <div class="brand-text-sub">达尔文华人生活门户</div>
        </div>
      </a>

      <nav class="nav-links">
        <a href="index.html">首页</a>
        <a href="news.html" class="active">新闻</a>
        <a href="jobs.html">工作</a>
        <a href="cv.html">Marketplace</a>
        <a href="rent.html">租房</a>
        <a href="forum.html">广场</a>
        <a href="my.html">我的</a>
        <a href="about.html">关于</a>
      </nav>
    </div>
  </header>

  <main class="page news-page">
    <div class="page-head">
      <h1>新闻</h1>
      <p class="lead">北领地本地新闻与生活资讯。</p>
    </div>

    <div id="newsList" class="news-list">
      <p>加载中…</p>
    </div>
  </main>

  <div id="newsModal" class="modal">
    <div id="modalBackdrop" class="modal-backdrop"></div>

    <div class="modal-dialog news-container">
      <button id="modalClose" class="modal-close news-close-btn" aria-label="关闭">×</button>

      <div class="article-shell">
        <div class="article-head">
          <div class="article-accent"></div>
          <h2 id="modalTitle" class="modal-title news-title"></h2>
          <div id="modalMeta" class="modal-meta news-meta"></div>

          <div class="article-stats-bar news-stats">
            <span class="article-stat">👁 阅读 <strong id="modalViews">0</strong></span>
            <button id="likeBtn" class="article-stat article-like-btn" type="button">
              👍 点赞 <strong id="modalLikes">0</strong>
            </button>
            <span class="article-stat">💬 评论 <strong id="modalCommentsCount">0</strong></span>
          </div>

          <div id="modalLead" class="article-lead news-subtitle"></div>
        </div>

        <div id="modalHero" class="hero-image news-cover" style="display:none;">
          <img id="modalHeroImage" src="" alt="新闻首图">
        </div>

        <!-- 关键：正文保留换行 -->
        <div id="modalBody" class="article-body news-content"></div>

        <div id="newsComments" class="news-comments comments-section">
          <h3 class="comments-title">评论</h3>
          <div id="newsCommentsInfo" class="news-comments-info"></div>
          <div id="newsCommentsList" class="news-comments-list comment-list"></div>

          <div class="news-comment-form comment-form">
            <textarea
              id="newsCommentContent"
              class="comment-textarea"
              placeholder="写下你的看法..."
            ></textarea>

            <div class="news-comment-actions">
              <div id="newsCommentStatus" class="news-comment-status"></div>
              <button id="newsCommentSubmit" class="news-comment-submit comment-submit" type="button">
                发表评论
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./news.js"></script>
</body>
</html>
