<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>注册 · Darwin Life Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f7f2;
      color: #0f172a;
    }
    .page {
      width: min(1040px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 430px;
      align-items: center;
      gap: 56px;
      padding: 48px 0;
    }
    .brand h1 {
      margin: 0 0 8px;
      font-size: 48px;
      line-height: 1.05;
      color: #15803d;
      letter-spacing: 0;
    }
    .brand p {
      margin: 0;
      max-width: 520px;
      font-size: 22px;
      line-height: 1.35;
      color: #1f2937;
    }
    .card {
      background: #ffffff;
      border: 1px solid #d1e5d4;
      border-radius: 8px;
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.12);
      padding: 18px;
    }
    .card-title {
      margin: 0 0 14px;
      font-size: 22px;
      line-height: 1.2;
    }
    input {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      border: 1px solid #cbd5d1;
      border-radius: 6px;
      font: inherit;
      font-size: 15px;
      margin-bottom: 10px;
      background: #ffffff;
    }
    input:focus {
      outline: 2px solid rgba(22, 163, 74, 0.18);
      border-color: #16a34a;
    }
    .captcha-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 76px;
      gap: 8px;
      margin-bottom: 10px;
    }
    .captcha-box {
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 6px;
      border: 1px dashed #b7d9bf;
      letter-spacing: 3px;
      font-weight: 700;
      background: #f8fcf9;
      user-select: none;
    }
    button {
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }
    #refreshCaptchaBtn {
      background: #e5e7eb;
      color: #111827;
    }
    #registerBtn {
      width: 100%;
      height: 48px;
      background: #16a34a;
      color: #ffffff;
      font-size: 18px;
      margin-top: 4px;
    }
    #registerBtn:hover:not(:disabled) {
      background: #15803d;
    }
    #resetRegisteredEmailBtn {
      display: none;
      width: 100%;
      height: 42px;
      margin-top: 10px;
      background: #dcfce7;
      color: #166534;
    }
    #msg {
      min-height: 22px;
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.45;
      text-align: center;
      color: #6b7280;
    }
    .divider {
      height: 1px;
      background: #e5e7eb;
      margin: 18px 0;
    }
    .login-link {
      display: block;
      width: fit-content;
      margin: 0 auto;
      color: #15803d;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
    .back-link {
      margin-top: 18px;
      text-align: center;
      font-size: 14px;
    }
    .back-link a {
      color: #15803d;
      text-decoration: none;
      font-weight: 600;
    }
    @media (max-width: 820px) {
      .page {
        grid-template-columns: 1fr;
        gap: 28px;
        align-items: start;
        padding-top: 40px;
      }
      .brand {
        text-align: center;
      }
      .brand h1 {
        font-size: 36px;
      }
      .brand p {
        margin: 0 auto;
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="brand">
      <h1>Darwin Life Hub</h1>
      <p>创建账户后即可发布和管理招聘、求职、租房与论坛内容。</p>
    </section>

    <section>
      <div class="card">
        <h2 class="card-title">创建新账户</h2>
        <form id="registerForm">
          <input id="email" type="email" placeholder="邮箱 Email" autocomplete="email" required />
          <input id="password" type="password" placeholder="设置密码，至少 6 位" autocomplete="new-password" required />
          <input id="confirmPassword" type="password" placeholder="再次输入密码" autocomplete="new-password" required />

          <div class="captcha-row">
            <div id="captchaText" class="captcha-box">AB12</div>
            <button type="button" id="refreshCaptchaBtn">换一个</button>
          </div>
          <input id="captchaInput" type="text" placeholder="请输入上面的验证码" autocomplete="off" required />

          <button type="submit" id="registerBtn">注册</button>
          <button type="button" id="resetRegisteredEmailBtn">这个邮箱已注册，发送密码重置邮件</button>
          <div id="msg" role="status" aria-live="polite"></div>
          <div class="divider"></div>
          <a class="login-link" href="login.html">已有账户？去登录</a>
        </form>
      </div>
      <div class="back-link">
        <a href="index.html">返回首页</a>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="register.js"></script>
</body>
</html>
